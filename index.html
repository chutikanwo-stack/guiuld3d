<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guild3D</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f1a;
    --surface: #13162a;
    --surface2: #1a1e35;
    --border: #2a2f52;
    --gold: #f0b429;
    --gold2: #ffd700;
    --teal: #2dd4bf;
    --purple: #a78bfa;
    --red: #f87171;
    --green: #4ade80;
    --text: #e2e8f0;
    --muted: #64748b;
    --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘Outfit’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
overflow-x: hidden;
}

/* Background stars */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image:
radial-gradient(1px 1px at 20% 30%, rgba(240,180,41,0.4) 0%, transparent 100%),
radial-gradient(1px 1px at 80% 10%, rgba(167,139,250,0.3) 0%, transparent 100%),
radial-gradient(1px 1px at 50% 60%, rgba(45,212,191,0.2) 0%, transparent 100%),
radial-gradient(1px 1px at 10% 80%, rgba(240,180,41,0.2) 0%, transparent 100%),
radial-gradient(1px 1px at 90% 70%, rgba(167,139,250,0.2) 0%, transparent 100%);
pointer-events: none;
z-index: 0;
}

/* ===== HEADER ===== */
header {
position: sticky;
top: 0;
z-index: 100;
background: rgba(13,15,26,0.85);
backdrop-filter: blur(16px);
border-bottom: 1px solid var(–border);
padding: 0 24px;
height: 64px;
display: flex;
align-items: center;
justify-content: space-between;
}

.logo {
display: flex;
align-items: center;
gap: 10px;
}

.logo-icon {
width: 36px;
height: 36px;
background: linear-gradient(135deg, var(–gold), var(–purple));
border-radius: 8px;
display: flex;
align-items: center;
justify-content: center;
font-size: 18px;
}

.logo-text {
font-family: ‘Cinzel’, serif;
font-size: 20px;
font-weight: 700;
background: linear-gradient(135deg, var(–gold), var(–gold2));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
letter-spacing: 1px;
}

.year-badge {
background: linear-gradient(135deg, rgba(240,180,41,0.15), rgba(167,139,250,0.15));
border: 1px solid var(–border);
border-radius: 20px;
padding: 6px 16px;
font-size: 13px;
color: var(–gold);
font-weight: 500;
}

/* ===== LAYOUT ===== */
.container {
max-width: 1200px;
margin: 0 auto;
padding: 32px 24px;
position: relative;
z-index: 1;
}

/* ===== SECTION TITLE ===== */
.section-title {
font-family: ‘Cinzel’, serif;
font-size: 13px;
letter-spacing: 3px;
color: var(–muted);
text-transform: uppercase;
margin-bottom: 16px;
}

/* ===== STATS ROW ===== */
.stats-row {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 16px;
margin-bottom: 32px;
}

.stat-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 16px;
padding: 20px;
position: relative;
overflow: hidden;
transition: transform 0.2s, border-color 0.2s;
}

.stat-card:hover { transform: translateY(-2px); border-color: rgba(240,180,41,0.3); }

.stat-card::before {
content: ‘’;
position: absolute;
top: 0; right: 0;
width: 80px; height: 80px;
border-radius: 50%;
opacity: 0.06;
transform: translate(20px, -20px);
}

.stat-card.gold::before { background: var(–gold); }
.stat-card.teal::before { background: var(–teal); }
.stat-card.purple::before { background: var(–purple); }
.stat-card.green::before { background: var(–green); }

.stat-label { font-size: 12px; color: var(–muted); margin-bottom: 8px; }
.stat-value { font-size: 28px; font-weight: 600; line-height: 1; }
.stat-card.gold .stat-value { color: var(–gold); }
.stat-card.teal .stat-value { color: var(–teal); }
.stat-card.purple .stat-value { color: var(–purple); }
.stat-card.green .stat-value { color: var(–green); }

/* ===== MAIN GRID ===== */
.main-grid {
display: grid;
grid-template-columns: 1fr 360px;
gap: 24px;
margin-bottom: 32px;
}

/* ===== ADD TASK PANEL ===== */
.panel {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 20px;
padding: 24px;
}

.panel-title {
font-family: ‘Cinzel’, serif;
font-size: 16px;
color: var(–gold);
margin-bottom: 20px;
display: flex;
align-items: center;
gap: 8px;
}

.form-group { margin-bottom: 16px; }

label {
display: block;
font-size: 12px;
color: var(–muted);
margin-bottom: 6px;
letter-spacing: 0.5px;
text-transform: uppercase;
}

input, select, textarea {
width: 100%;
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 10px;
padding: 10px 14px;
color: var(–text);
font-family: ‘Outfit’, sans-serif;
font-size: 14px;
outline: none;
transition: border-color 0.2s;
}

input:focus, select:focus, textarea:focus {
border-color: var(–gold);
box-shadow: 0 0 0 3px rgba(240,180,41,0.1);
}

textarea { resize: vertical; min-height: 72px; }

select option { background: var(–surface2); }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.btn-primary {
width: 100%;
padding: 12px;
background: linear-gradient(135deg, var(–gold), #e09f00);
border: none;
border-radius: 10px;
color: #0d0f1a;
font-family: ‘Cinzel’, serif;
font-size: 14px;
font-weight: 700;
letter-spacing: 1px;
cursor: pointer;
transition: all 0.2s;
margin-top: 4px;
}

.btn-primary:hover {
transform: translateY(-1px);
box-shadow: 0 4px 16px rgba(240,180,41,0.3);
}

/* ===== MEMBER CARDS ===== */
.members-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 16px;
margin-bottom: 32px;
}

.member-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 16px;
padding: 20px;
cursor: pointer;
transition: all 0.2s;
position: relative;
overflow: hidden;
}

.member-card:hover { transform: translateY(-3px); border-color: rgba(240,180,41,0.4); }
.member-card.active { border-color: var(–gold); background: rgba(240,180,41,0.05); }

.member-card::after {
content: ‘’;
position: absolute;
bottom: 0; left: 0; right: 0;
height: 2px;
background: linear-gradient(90deg, var(–gold), var(–purple));
transform: scaleX(0);
transition: transform 0.3s;
}

.member-card:hover::after, .member-card.active::after { transform: scaleX(1); }

.member-top {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 14px;
}

.avatar {
width: 44px;
height: 44px;
border-radius: 12px;
display: flex;
align-items: center;
justify-content: center;
font-size: 20px;
font-weight: 700;
flex-shrink: 0;
font-family: ‘Cinzel’, serif;
}

.member-info { flex: 1; min-width: 0; }
.member-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.member-role { font-size: 11px; color: var(–muted); margin-top: 2px; }

.level-badge {
background: linear-gradient(135deg, rgba(240,180,41,0.2), rgba(167,139,250,0.2));
border: 1px solid rgba(240,180,41,0.3);
border-radius: 8px;
padding: 3px 8px;
font-size: 11px;
color: var(–gold);
font-weight: 600;
}

.exp-bar-wrap { margin-bottom: 12px; }
.exp-label { display: flex; justify-content: space-between; font-size: 11px; color: var(–muted); margin-bottom: 4px; }

.exp-bar {
height: 6px;
background: var(–surface2);
border-radius: 999px;
overflow: hidden;
}

.exp-fill {
height: 100%;
border-radius: 999px;
background: linear-gradient(90deg, var(–gold), var(–purple));
transition: width 0.6s ease;
}

.member-stats {
display: flex;
gap: 12px;
font-size: 12px;
}

.mstat { color: var(–muted); }
.mstat span { color: var(–text); font-weight: 600; }

/* ===== TASK LIST ===== */
.tasks-header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 16px;
}

.filter-tabs {
display: flex;
gap: 6px;
}

.filter-tab {
padding: 6px 14px;
border-radius: 20px;
font-size: 12px;
cursor: pointer;
border: 1px solid var(–border);
background: transparent;
color: var(–muted);
transition: all 0.2s;
}

.filter-tab.active {
background: rgba(240,180,41,0.15);
border-color: rgba(240,180,41,0.4);
color: var(–gold);
}

.task-list { display: flex; flex-direction: column; gap: 10px; }

.task-item {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 14px;
padding: 16px;
display: flex;
align-items: center;
gap: 14px;
transition: all 0.2s;
animation: slideIn 0.3s ease;
}

@keyframes slideIn {
from { opacity: 0; transform: translateY(-8px); }
to { opacity: 1; transform: translateY(0); }
}

.task-item:hover { border-color: rgba(240,180,41,0.2); }

.task-check {
width: 22px;
height: 22px;
border-radius: 6px;
border: 2px solid var(–border);
cursor: pointer;
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.2s;
}

.task-check:hover { border-color: var(–gold); }
.task-check.done { background: var(–gold); border-color: var(–gold); color: #0d0f1a; font-size: 12px; }

.task-body { flex: 1; min-width: 0; }
.task-name { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.task-name.done { text-decoration: line-through; color: var(–muted); }

.task-meta { display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(–muted); flex-wrap: wrap; }

.task-assignee {
display: flex;
align-items: center;
gap: 4px;
}

.mini-avatar {
width: 18px;
height: 18px;
border-radius: 4px;
font-size: 9px;
display: flex;
align-items: center;
justify-content: center;
font-weight: 700;
font-family: ‘Cinzel’, serif;
}

.tag {
padding: 2px 8px;
border-radius: 4px;
font-size: 10px;
font-weight: 600;
letter-spacing: 0.5px;
text-transform: uppercase;
}

.tag-easy { background: rgba(74,222,128,0.15); color: var(–green); }
.tag-medium { background: rgba(240,180,41,0.15); color: var(–gold); }
.tag-hard { background: rgba(248,113,113,0.15); color: var(–red); }

.task-exp {
font-size: 12px;
font-weight: 600;
color: var(–purple);
white-space: nowrap;
}

.task-delete {
width: 28px;
height: 28px;
border-radius: 8px;
border: none;
background: transparent;
color: var(–muted);
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.2s;
font-size: 14px;
}
