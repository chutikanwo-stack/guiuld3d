<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guild3D</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0d0f1a;
--surface:#13162a;
--border:#2a2f52;
--gold:#f0b429;
--text:#e2e8f0;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Outfit',sans-serif;
background:var(--bg);
color:var(--text);
padding:40px;
}

h1{
font-family:'Cinzel',serif;
margin-bottom:30px;
color:var(--gold);
}

.panel{
background:var(--surface);
border:1px solid var(--border);
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input,select,button{
padding:10px;
border-radius:6px;
border:1px solid var(--border);
background:#1a1e35;
color:white;
margin-right:10px;
}

button{
cursor:pointer;
background:var(--gold);
color:black;
border:none;
}

.task{
background:#13162a;
border:1px solid #2a2f52;
padding:10px;
margin-top:10px;
border-radius:6px;
display:flex;
justify-content:space-between;
align-items:center;
}

</style>
</head>

<body>

<h1>⚔ Guild3D Task Board</h1>

<div class="panel">

<input id="taskName" placeholder="ชื่องาน">

<select id="taskAssignee">
<option value="SUANG">SUANG</option>
<option value="PRAN">PRAN</option>
<option value="PANGPOND">PANGPOND</option>
<option value="FIW">FIW</option>
<option value="BECK">BECK</option>
<option value="WUT">WUT</option>
</select>

<select id="taskDiff">
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>

<button onclick="addTask()">เพิ่มงาน</button>

</div>

<div id="taskList"></div>


<script>

// ===== WEBHOOK URL =====

const GET_TASKS = "https://pb-n8n.planbmedia.co.th/webhook/guild3d/get-tasks"

const ADD_TASK = "https://pb-n8n.planbmedia.co.th/webhook/guild3d/add-task"

const COMPLETE_TASK = "https://pb-n8n.planbmedia.co.th/webhook/guild3d/complete-task"



let tasks=[]


// ===== โหลดงาน =====

async function loadTasks(){

try{

const res = await fetch(GET_TASKS)

const data = await res.json()

tasks = data.tasks || []

render()

}catch(e){

console.log("โหลดงานไม่ได้",e)

}

}



// ===== แสดงรายการ =====

function render(){

const list = document.getElementById("taskList")

list.innerHTML=""

tasks.forEach(t=>{

const div=document.createElement("div")

div.className="task"

div.innerHTML=`
<span>${t.name} - ${t.assigneeName}</span>
<button onclick="completeTask(${t.id})">เสร็จ</button>
`

list.appendChild(div)

})

}



// ===== เพิ่มงาน =====

async function addTask(){

const name=document.getElementById("taskName").value

const assignee=document.getElementById("taskAssignee").value

const diff=document.getElementById("taskDiff").value

const task={

id:Date.now(),

name:name,

assigneeName:assignee,

difficulty:diff,

done:false

}

await fetch(ADD_TASK,{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(task)

})

loadTasks()

}



// ===== ทำงานเสร็จ =====

async function completeTask(id){

await fetch(COMPLETE_TASK,{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

taskId:id

})

})

loadTasks()

}



// ===== เริ่มระบบ =====

loadTasks()

</script>

</body>
</html>
